<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="nav.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background:#ffffff;
    }

    .navbar{
        height:72px;
        background:#16243d;
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:0 48px;
    }

    .logo{
        color:white;
        font-size:20px;
        font-weight:600;
    }

    .task-btn{
        background:#3b82f6;
        color:white;
        border:none;
        padding:12px 22px;
        border-radius:8px;
        font-size:15px;
        cursor:pointer;
    }

    .container{
        padding:35px 120px;
    }
    a{
        text-decoration: none;
        color: white;
    }

    .heading{
        font-size:52px;
        font-weight:700;
        color:#000;
    }
</style>
<body>
    <nav class="navbar">
            <div class="logo"><a href="/">TaskFlow Pro</a></div>

        <button class="task-btn"><a href="/add"> + New Task </a></button>
    </nav>

    <!-- <div class="container">
        <h1 class="heading">Add New Task</h1>
    </div> -->

    <div class="container">
    <h2>Add New Task</h2>
    <form  method="post">
        <div class="mb-3 mt-3">
        <input type="text" class="form-control" id="title" placeholder="Task Title" name="title">
        </div>

        <div class="mb-3 mt-3">
            <input type="text" class="form-control form-control-lg" id="=description" placeholder="Task Description" name="description">
        </div>

        <div class="mb-3 mt-3">
            <input type="date" class="form-control form-control-lg" id="=date" placeholder="Task Description" name="due_date">
        </div>

        <div class="mb-3 mt-3">
            <button type="submit" class="form-control btn btn-primary">
                Add Task
            </button>
        </div>
        
    </form>
    </div>


    
</body>
</html>
