<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow Pro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background:#ffffff;
    }

    .navbar{
        height:72px;
        background:#16243d;
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:0 48px;
    }

    .logo{
        color:white;
        font-size:20px;
        font-weight:600;
    }

    .task-btn{
        background:#3b82f6;
        color:white;
        border:none;
        padding:12px 22px;
        border-radius:8px;
        font-size:15px;
        cursor:pointer;
    }

    .container{
        padding:35px 120px;
    }

    .heading{
        font-size:52px;
        font-weight:700;
        color:#000;
        text-align: center;
    }

    .card{
        border:none;
        border-radius:15px;
        transition:0.3s;
    }

    .card:hover{
        transform:translateY(-5px);
        box-shadow:0 10px 25px rgba(0,0,0,0.15);
    }
    a{
        text-decoration: none;
        color: white;
    }
    h2{
        padding: 30px;
    }
</style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">TaskFlow Pro</div>

        <button class="task-btn"><a href="/add"> + New Task </a> </button>
    </nav>
    <h2>My Tasks</h2> 

<div class="container-fluid ml-10" >
    <div class="row g-4">

        {% for task in tasks %}
        <div class="col-lg-4 col-md-6">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">{{ task.title }}</h5>
                    <p class="card-text">{{ task.description }}</p>

                    <a href="/update-task/{{ task.id }}" class="btn btn-sm btn-primary">
                        Edit
                    </a>

                    <a href="/delete-task/{{ task.id }}" class="btn btn-sm btn-danger">
                        Delete
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}

    </div>
</div>

</body>
</html>
